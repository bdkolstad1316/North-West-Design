<!DOCTYPE html><html><head><style>

.row { margin:20px 0; padding:20px; background:#fff; border:1px solid #ddd; }
.label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:#666; margin-bottom:8px; }
.sm img { height:40px; }
.md img { height:60px; }
.lg img { height:100px; }
.red img { color: #d62828; }

<div class="row sm"><div class="label">Nav size (40px tall)</div><img src="images/nwd-wordmark.svg" /></div>
<div class="row md"><div class="label">Medium (60px tall)</div><img src="images/nwd-wordmark.svg" /></div>
<div class="row lg"><div class="label">Large (100px tall)</div><img src="images/nwd-wordmark.svg" /></div>
<div class="row sm" style="background:#1a1a1a;color:#f5f5f5;"><div class="label" style="color:#aaa">On dark</div><img src="images/nwd-wordmark.svg" /></div>
</body></html>
